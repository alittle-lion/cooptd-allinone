<!DOCTYPE html>
<html lang="ko">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>협동타워 디펜스 길드 홍보</title>

    <link rel="stylesheet" href="style.css">

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;700;800&display=swap" rel="stylesheet">

</head>

<body>

<!-- ================= HEADER ================= -->

<header>

    <h1>협동타워 디펜스 길드 홍보 🏰</h1>

    <p>
        협동타워 디펜스 최고의 길드를 찾아 함께 플레이하세요.<br>
        해당 사이트는 공익의 목적을 위해서 제작하였습니다.
    </p>

</header>



<!-- ================= MAIN MENU ================= -->

<section class="menu-grid">

    <a href="https://open.kakao.com/" target="_blank" class="menu-card">
        <h2>💬 문의하기</h2>
        <span>개발자 오픈채팅</span>
    </a>

    <a href="#" class="menu-card">
        <h2>🔧 협타디툴</h2>
        <span>마신배치툴,<br>마신석 계산 사이트</span>
    </a>

    <a href="https://cafe.naver.com/cooptd" target="_blank" class="menu-card">
        <h2>📢 공식카페</h2>
        <span>공지사항<br>업데이트</span>
    </a>

    <a href="#" class="menu-card">
        <h2>📝 준비중</h2>
        <span>준비중인 기능</span>
    </a>

    <a href="#" class="menu-card">
        <h2>🏆 준비중</h2>
        <span>준비중인 기능</span>
    </a>

    <a href="#" class="menu-card">
        <h2>🎁 준비중</h2>
        <span>준비중인 기능</span>
    </a>

</section>



<!-- ================= SEARCH ================= -->

<section class="search">

    <input
        type="text"
        id="search"
        placeholder="길드 이름 혹은 운영진 닉네임 검색..."
    >

</section>



<!-- ================= CATEGORY ================= -->

<section class="category-bar">

    <button
        class="category-btn active"
        data-category="ALL"
        onclick="filterCategory('ALL', this)">
        전체
    </button>

    <button
        class="category-btn"
        data-category="RANK"
        onclick="filterCategory('RANK', this)">
        RANK
    </button>

    <button
        class="category-btn"
        data-category="HOT"
        onclick="filterCategory('HOT', this)">
        HOT
    </button>

    <button
        class="category-btn"
        data-category="NEW"
        onclick="filterCategory('NEW', this)">
        NEW
    </button>

    <button
        class="category-btn"
        data-category="recruit"
        onclick="filterCategory('recruit', this)">
        모집중
    </button>

    <button
        class="category-btn"
        data-category="closed"
        onclick="filterCategory('closed', this)">
        모집중단
    </button>

</section>



<!-- ================= 추천 길드 ================= -->

<section>

    <h2 class="section-title">
        🔥 추천 길드
    </h2>

    <div
        id="featuredGuilds"
        class="guild-grid">
    </div>

</section>



<!-- ================= 전체 길드 ================= -->

<section>

    <h2 class="section-title">
        ⭐ 전체 길드
    </h2>

    <div
        id="guildContainer"
        class="guild-grid">
    </div>

</section>



<!-- ================= FOOTER ================= -->

<footer>

    <p>
        © 2026 협동 디펜스 길드 홍보 사이트
    </p>

</footer>



<!-- ================= GUILD MODAL ================= -->

<div id="guildModal" class="modal">

    <div class="modal-content">

        <button class="close-btn" onclick="closeModal()">✕</button>

        <div class="modal-top">

            <!-- 좌측 길드 배너 -->

            <div class="modal-banner">

                <img
                    id="modalBanner"
                    src=""
                    alt="길드 배너">

            </div>


            <!-- 우측 정보 -->

            <div class="modal-info">

                <h2
                    id="modalName"
                    class="modal-title">
                </h2>


                <div class="modal-grid">

                    <div class="info-card">

                        <div class="info-title">
                            길드장
                        </div>

                        <div
                            id="modalLeader"
                            class="info-value">
                        </div>

                    </div>


                    <div class="info-card">

                        <div class="info-title">
                            운영진
                        </div>

                        <div
                            id="modalManager"
                            class="info-value">
                        </div>

                    </div>


                    <div class="info-card">

                        <div class="info-title">
                            현재 인원
                        </div>

                        <div
                            id="modalMembers"
                            class="info-value">
                        </div>

                    </div>


                    <div class="info-card">

                        <div class="info-title">
                            모집상태
                        </div>

                        <div
                            id="modalStatus"
                            class="info-value">
                        </div>

                    </div>

                </div>



                <!-- 가입조건 -->

                <div class="condition-box">

                    <div class="condition-title">
                        가입조건
                    </div>

                    <ul id="modalCondition">
                    </ul>

                </div>



                <!-- 문의 -->

                <div class="modal-footer">

                    <a
                        id="modalLink"
                        href="#"
                        target="_blank"
                        class="modal-link">

                        문의하기

                    </a>

                </div>

            </div>

        </div>

    </div>

</div>



<script src="./script.js"></script>

</body>

</html>
