<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>협동타워 디펜스 길드 홍보</title>

    <link rel="stylesheet" href="style.css">

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;700;800&display=swap" rel="stylesheet">
</head>

<body>

<!-- ================= HEADER ================= -->

<header>

    <h1>🏰 협동타워 디펜스 길드</h1>

    <p>
        최고의 길드를 찾아 함께 플레이하세요.
    </p>

</header>


<!-- ================= MAIN MENU ================= -->

<section class="menu-grid">

    <a href="https://open.kakao.com/" target="_blank" class="menu-card">

        <h2>💬 오픈채팅</h2>

        <span>길드 통합 오픈채팅</span>

    </a>

    <a href="https://discord.com/" target="_blank" class="menu-card">

        <h2>🎧 디스코드</h2>

        <span>공식 디스코드</span>

    </a>

    <a href="https://cafe.naver.com/cooptd" target="_blank" class="menu-card">

        <h2>📢 공지사항</h2>

        <span>업데이트 및 이벤트</span>

    </a>

<!-- 추가 -->

    <a href="#" class="menu-card">

        <h2>📝 길드 등록</h2>

        <span>길드를 등록해보세요.</span>
    
    </a>
    
    <a href="#" class="menu-card">

        <h2>🏆 길드 랭킹</h2>

        <span>인기 길드를 확인하세요.</span>

    </a>

    <a href="#" class="menu-card">

        <h2>🎁 이벤트</h2>

        <span>현재 진행중인 이벤트</span>

    </a>

    </section>


<!-- ================= SEARCH ================= -->

<section class="search">

    <input
        type="text"
        id="search"
        placeholder="길드 이름 검색..."
    >

</section>


<!-- ================= 추천 길드 ================= -->

<section>

    <h2 class="section-title">
        🔥 추천 길드
    </h2>

    <div id="featuredGuilds" class="guild-grid">

        <!-- JS 자동 생성 -->

    </div>

</section>


<!-- ================= 전체 길드 ================= -->

<section>

    <h2 class="section-title">
        ⭐ 전체 길드
    </h2>

    <div id="guildContainer" class="guild-grid">

        <!-- JS 자동 생성 -->

    </div>

</section>


<!-- ================= FOOTER ================= -->

<footer>

    <p>

        © 2026 협동 디펜스 길드 홍보 사이트

    </p>

</footer>


<script src="script.js"></script>

</body>
</html>
