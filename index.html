<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>협동타워 디펜스 길드 홍보</title>

    <link rel="stylesheet" href="style.css">

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;700;800&display=swap" rel="stylesheet">
</head>

<body>

<!-- ================= HEADER ================= -->

<header>

    <h1>🏰 협동타워 디펜스 길드 🏰</h1>

    <p>
        최고의 길드를 찾아 함께 플레이하세요.
    </p>

</header>


<!-- ================= MAIN MENU ================= -->

<section class="menu-grid">

    <a href="https://open.kakao.com/" target="_blank" class="menu-card">
        <h2>💬 문의하기</h2>
        <span>개발자 오픈채팅</span>
    </a>

    <a href="#" class="menu-card">
        <h2>🔧 협타디툴</h2>
        <span>마신배치툴, 마신석 계산 사이트</span>
    </a>

    <a href="https://cafe.naver.com/cooptd" target="_blank" class="menu-card">
        <h2>📢 공식카페</h2>
        <span>공지사항 및 업데이트</span>
    </a>

    <a href="#" class="menu-card">
        <h2>📝 준비중</h2>
        <span>준비중인 기능</span>
    </a>

    <a href="#" class="menu-card">
        <h2>🏆 길드 랭킹</h2>
        <span>인기 길드 확인</span>
    </a>

    <a href="#" class="menu-card">
        <h2>🎁 준비중</h2>
        <span>추가 예정 기능</span>
    </a>

</section>


<!-- ================= SEARCH ================= -->

<section class="search">

    <input
        type="text"
        id="search"
        placeholder="길드 이름 혹은 운영진 닉네임 검색..."
    >

</section>


<!-- ================= CATEGORY FILTER ================= -->

<section class="category-bar">

    <button class="category-btn active" onclick="filterCategory('ALL')">전체</button>
    <button class="category-btn" onclick="filterCategory('RANK')">RANK</button>
    <button class="category-btn" onclick="filterCategory('HOT')">HOT</button>
    <button class="category-btn" onclick="filterCategory('NEW')">NEW</button>
    <button class="category-btn" onclick="filterCategory('recruit')">모집중</button>
    <button class="category-btn" onclick="filterCategory('closed')">모집중단</button>

</section>


<!-- ================= 추천 길드 ================= -->

<section>

    <h2 class="section-title">🔥 추천 길드</h2>

    <div id="featuredGuilds" class="guild-grid"></div>

</section>


<!-- ================= 전체 길드 ================= -->

<section>

    <h2 class="section-title">⭐ 전체 길드</h2>

    <div id="guildContainer" class="guild-grid"></div>

</section>


<!-- ================= FOOTER ================= -->

<footer>

    <p>© 2026 협동 디펜스 길드 홍보 사이트</p>

</footer>


<script src="script.js"></script>

</body>
</html>
